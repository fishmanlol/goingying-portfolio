<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Portfolio</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ===== HERO BIO ===== -->
<header class="hero" id="hero">
  <div class="shell" style="display: contents;">
    <div class="hero__portrait">
      <img data-bind="portrait" alt="Portrait" />
    </div>
    <div class="hero__copy">
      <div class="hero__eyebrow" data-bind="role-short"></div>
      <h1 class="hero__name" data-bind="name"></h1>
      <div class="hero__role" data-bind="role-long"></div>
      <p class="hero__bio" data-bind="bio"></p>
      <div class="hero__meta">
        <div>
          <span class="hero__meta-num" data-bind="years-licensed"></span>
          <span class="hero__meta-label">years experienced</span>
        </div>
        <div>
          <span class="hero__meta-num" data-bind="location-short"></span>
          <span class="hero__meta-label" data-bind="location-long"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="hero__scrollhint" style="display:none;"></div>
</header>

<!-- ===== COLLAPSED TOP BAR ===== -->
<div class="topbar" id="topbar" aria-label="Designer info">
  <div class="topbar__center">
    <span class="topbar__name" data-bind="name"></span>
    <span class="topbar__sep">—</span>
    <span data-bind="topbar-line"></span>
    <span class="topbar__hint" aria-hidden="true">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="vertical-align: -2px; margin-right: 5px;"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1"/><path d="M6 5.5v2.5M6 4v.01" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
      hover for bio
    </span>
  </div>
</div>

<!-- ===== FLOATING BIO OVERLAY (hover-expand) ===== -->
<div class="bio-float" id="bioFloat" aria-hidden="true">
  <div class="bio-float__inner">
    <div class="bio-float__portrait">
      <img data-bind="portrait" alt="" />
    </div>
    <div>
      <h2 class="bio-float__name" data-bind="name"></h2>
      <div class="bio-float__role" data-bind="role-short"></div>
      <p class="bio-float__bio" data-bind="bio"></p>
    </div>
    <div class="bio-float__meta">
      <div class="bio-float__meta-row"><span>Licensed</span><span data-bind="licensed"></span></div>
      <div class="bio-float__meta-row"><span>Education</span><span data-bind="education"></span></div>
      <div class="bio-float__meta-row"><span>Studio</span><span data-bind="studio"></span></div>
      <div class="bio-float__meta-row"><span>Email</span><span data-bind="email"></span></div>
    </div>
  </div>
</div>

<!-- ===== WORK ===== -->
<main class="work" id="work">
  <div class="shell">
    <div id="projectList"></div>
  </div>
</main>

<script src="content/manifest.js"></script>
<script src="content-loader.js"></script>
<script src="app.js"></script>
</body>
</html>
